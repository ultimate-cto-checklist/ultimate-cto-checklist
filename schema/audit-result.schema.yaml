# Audit Result File Schema
# Single source of truth for audit result markdown files.
# Referenced by skills (write) and dashboard (read).
#
# Each audit result is a markdown file with YAML frontmatter.
# Filename must match the item_id (e.g., GIT-001.md).

frontmatter:
  required:
    item_id:
      type: string
      pattern: "^[A-Z]+-\\d{3}$"
      description: Checklist item ID. Use item_id, NOT id.
      examples: [GIT-001, DEP-005, AUTH-010]

    title:
      type: string
      description: Human-readable item title

    status:
      type: string
      enum: [pass, fail, partial, blocked, waived]
      description: always lowercase

    severity:
      type: string
      enum: [critical, recommended]

    section:
      type: string
      pattern: "^\\d{2}-[a-z-]+$"
      examples: [01-git-repo-setup, 02-dependencies, 03-authentication-endpoints]

    audited_at:
      type: string
      format: date  # YYYY-MM-DD
      description: Date the item was audited

  optional:
    auditor:
      type: string
      description: Who performed the audit (e.g., claude-session)

    category:
      type: string
      description: Sub-category within the section

body_headings:
  # Headings must appear in this order when present.
  # "required_when" specifies which statuses require the heading.

  - heading: "## Summary"
    required_when: [pass, fail, partial, blocked, waived]
    description: >
      1-3 sentences explaining the result at a glance.
      This is the primary display text in the dashboard.
      Required for ALL statuses.

  - heading: "## Evidence"
    required_when: [pass, fail, partial]
    description: >
      Command outputs, file contents, API responses, and other
      observations that support the status determination.

  - heading: "## Reason for Failure"
    required_when: [fail]
    description: >
      Clear explanation of why the item failed.
      What criteria were not met.

  - heading: "## Reason for Partial"
    required_when: [partial]
    description: >
      What criteria were met and what was missing.

  - heading: "## Recommendations"
    required_when: []
    description: >
      Optional. Remediation steps or improvement suggestions.

  - heading: "## Notes"
    required_when: []
    description: >
      Optional. Extra context, caveats, edge cases.

filename:
  pattern: "{item_id}.md"
  description: >
    Filename must match the item_id field in frontmatter.
    Example: GIT-001.md for item_id: GIT-001

example: |
  ---
  item_id: GIT-005
  title: Branch protections configured
  status: fail
  severity: critical
  section: 01-git-repo-setup
  audited_at: 2026-02-09
  auditor: claude-session
  ---

  ## Summary

  No branch protection rules are configured on main or staging branches.

  ## Evidence

  - `gh api repos/acme/app/branches/main/protection` returned 404
  - `gh api repos/acme/app/branches/staging/protection` returned 404

  ## Reason for Failure

  Neither main nor staging has any branch protection rules.
  Direct pushes and force-pushes are allowed.

  ## Recommendations

  1. Enable branch protection on main: require PR reviews, status checks
  2. Enable branch protection on staging: require status checks

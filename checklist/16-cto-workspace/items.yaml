    title: AI-assisted project briefings
    question: "How long does it take you to know what your team shipped this week?"
    severity: recommended
    category: Project Briefings
    description: >
      Claude skill or CLAUDE.md documentation exists for getting project status briefings on demand.
      Must query git log (commits), gh pr list (PRs), and gh run list (deployments).
      Output should be a synthesized brief, not raw command output.

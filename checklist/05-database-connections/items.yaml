section:
  id: "05"
  name: Database & Connections
  description: Database configuration, migrations, users, and access controls
default_scope: project

items:
  - id: DB-001
    title: Connection pooling and optimization configured
    question: "What happens to your DB when traffic spikes unexpectedly?"
    severity: critical
    type: auto
    summary: |
      Verify Prisma connection pool is explicitly configured with pool size,
      connection timeout, and idle timeout settings.

  - id: DB-002
    title: CI verifies migrations on ephemeral test DB
    question: "Migrations tested against a real DB, or just hope they work?"
    severity: critical
    type: auto
    summary: |
      CI pipeline must apply migrations to a Docker-based ephemeral test database,
      not just dry-run or status checks.

  - id: DB-003
    title: AI-assisted migration review with human override
    question: "Who caught the last DROP COLUMN before it hit production?"
    severity: recommended
    type: auto+manual
    summary: |
      Migrations reviewed for risky patterns (DROP, ALTER COLUMN, DELETE, etc.)
      with automated flagging and required human approval before merge.

  - id: DB-004
    title: Database users documented (including read-only user)
    question: "How many DB users exist, and do you know what each one can do?"
    severity: critical
    type: guided-manual
    summary: |
      All database users documented with purpose and permissions.
      Must include a read-only user for safe debugging/reporting.

  - id: DB-005
    title: App user cannot DROP DATABASE
    question: "Could a SQL injection bug wipe your entire database?"
    severity: critical
    type: guided-manual
    summary: |
      Application database user must not have DROP privilege.
      Verify via SHOW GRANTS output.

  - id: DB-006
    title: Soft delete pattern implemented
    question: "When a user deletes their account, is it recoverable?"
    severity: recommended
    type: auto+manual
    summary: |
      Data uses soft deletes (deleted_at column) rather than hard deletes.
      Separate service handles permanent deletion after retention period.

  - id: DB-007
    title: Redis documented if storing critical data
    question: "If Redis restarts, what critical data evaporates with it?"
    severity: recommended
    type: auto
    summary: |
      If Redis stores critical data (sessions, queues), connection and usage
      must be documented. Cache-only usage is acceptable without documentation.

  - id: DB-008
    title: DB admin tools on-demand and Zero Trust protected
    question: "Is phpMyAdmin running 24/7 somewhere, exposed to the internet?"
    severity: critical
    type: guided-manual
    summary: |
      Database admin tools (phpMyAdmin, Adminer, pgAdmin) must be on-demand only
      (not always running) and protected behind Cloudflare Zero Trust when active.

  - id: DB-009
    title: Admin password restricted to critical people
    question: "Who on your team could drop the production database right now?"
    severity: critical
    type: guided-manual
    summary: |
      Database admin credentials limited to 1-2 critical people (CTO, DevOps lead).
      Stored in secret manager, not shared broadly or in plain text.

section:
  id: "20"
  name: Email Infrastructure
  description: DNS authentication (MX, SPF, DKIM, DMARC), deliverability testing, and email logging

items:
  - id: EMAIL-001
    title: MX records configured
    severity: critical
    category: DNS Authentication
    summary: MX records exist, resolve, and are reachable on port 25 for all domains in email inventory

  - id: EMAIL-002
    title: SPF configured
    severity: critical
    category: DNS Authentication
    summary: SPF records exist with authorized senders and hard fail (-all) or documented soft fail (~all)

  - id: EMAIL-003
    title: DKIM configured
    severity: critical
    category: DNS Authentication
    summary: DKIM records exist with valid public keys for all sending domains/subdomains

  - id: EMAIL-004
    title: DMARC configured
    severity: critical
    category: DNS Authentication
    summary: DMARC records with enforcement policy (quarantine/reject), reporting configured, reports reviewed

  - id: EMAIL-005
    title: Email deliverability testing
    severity: recommended
    category: Email Monitoring
    summary: Spam scoring tool and periodic placement tests with fresh accounts (Gmail, Outlook minimum)

  - id: EMAIL-006
    title: Transactional email control and logging
    severity: critical
    category: Email Monitoring
    summary: Dedicated provider with dashboard access, bounce tracking, open/click tracking (or documented exceptions)

  - id: EMAIL-007
    title: Marketing email logging
    severity: recommended
    category: Email Monitoring
    summary: Marketing platform with send logs, engagement metrics, and individual recipient tracking

  - id: EMAIL-008
    title: Email log retention
    severity: recommended
    category: Email Monitoring
    summary: Intentionally defined retention period (typically 2-4 weeks) for transactional and marketing logs

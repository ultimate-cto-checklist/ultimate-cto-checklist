section: 21-caching
title: Caching
description: Static asset caching via CDN and content hash-based cache invalidation
default_scope: project

items:
  - id: CACHE-001
    title: Static assets cached by CDN
    severity: recommended
    category: Static Asset Caching
    summary: JS, CSS, images, and fonts served through CDN with appropriate Cache-Control headers

